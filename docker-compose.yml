services:
  postgres:
    image: postgres:16-alpine
    container_name: inventory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventory_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_backend"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./inventory-backend
    container_name: inventory-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/inventory_backend?schema=public
      PORT: 5000
      NODE_ENV: production
      ALLOWED_ORIGIN: http://localhost:8080
      JWT_SECRET: change-this-secret-before-production
      JWT_EXPIRES_IN: 30d
      BCRYPT_SALT_ROUNDS: 10
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./inventory-web
      args:
        VITE_API_URL: /api
    container_name: inventory-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:
